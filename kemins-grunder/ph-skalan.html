<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pH-skalan — Demonstrationsverktyg</title>
    <meta name="description" content="Interaktivt demonstrationsverktyg: placera vardagsämnen på pH-skalan.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #242836;
            --text: #e8eaf0;
            --text-muted: #8b8fa3;
            --border: #2a2e3d;
            --accent: #6c5ce7;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* ===== pH SCALE ===== */
        .scale-wrapper {
            width: 100%;
            max-width: 1000px;
            position: relative;
            margin-bottom: 2.5rem;
        }

        .placed-area {
            position: relative;
            width: 100%;
            min-height: 80px;
            margin-bottom: 0.5rem;
        }

        .ph-gradient {
            width: 100%;
            height: 56px;
            border-radius: var(--radius);
            background: linear-gradient(to right,
                #e74c3c 0%,
                #e67e22 10%,
                #f39c12 18%,
                #f1c40f 28%,
                #a8d66a 36%,
                #2ecc71 44%,
                #27ae60 50%,
                #1abc9c 56%,
                #3498db 64%,
                #2980b9 72%,
                #8e44ad 85%,
                #6c3483 100%
            );
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            position: relative;
        }

        .ph-numbers {
            position: relative;
            width: 100%;
            height: 1.5rem;
            margin-top: 0.4rem;
        }

        .ph-numbers span {
            position: absolute;
            transform: translateX(-50%);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .ph-labels {
            display: flex;
            justify-content: space-between;
            padding: 0.15rem 0;
        }

        .ph-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .ph-label.acid { color: #e74c3c; }
        .ph-label.neutral { color: #2ecc71; }
        .ph-label.base { color: #8e44ad; }

        /* ===== PLACED ITEMS ===== */
        .placed-item {
            position: absolute;
            bottom: 0;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: slideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
            cursor: pointer;
        }

        .placed-item .placed-tag {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.3rem 0.6rem;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: border-color 0.2s ease;
        }

        .placed-item:hover .placed-tag,
        .placed-item.active .placed-tag {
            border-color: var(--accent);
        }

        .placed-item .placed-line {
            width: 2px;
            height: 16px;
            background: var(--text-muted);
            opacity: 0.5;
        }

        .placed-item .placed-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: white;
            border: 2px solid var(--bg);
            box-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        @keyframes slideIn {
            0% { opacity: 0; transform: translateX(-50%) translateY(-15px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .placed-item[data-row="0"] { bottom: 0; }
        .placed-item[data-row="1"] { bottom: 36px; }
        .placed-item[data-row="2"] { bottom: 72px; }

        /* ===== INFO PANEL ===== */
        .info-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 2px solid var(--accent);
            padding: 1.5rem 2rem;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 200;
            box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .info-panel.visible {
            transform: translateY(0);
        }

        .info-panel .info-body {
            flex: 1;
        }

        .info-panel .info-name {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 0.2rem;
        }

        .info-panel .info-ph {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.4rem;
        }

        .info-panel .info-context {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .info-panel .info-close {
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info-panel .info-close:hover {
            border-color: var(--text);
            color: var(--text);
        }

        /* ===== SUBSTANCE CHIPS ===== */
        .chips-area {
            width: 100%;
            max-width: 1000px;
        }

        .chips-area h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: var(--text-muted);
        }

        .chips-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 0.6rem 1.1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: all 0.25s ease;
            user-select: none;
        }

        .chip:hover {
            background: var(--surface-hover);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(108, 92, 231, 0.2);
        }

        .chip:active {
            transform: translateY(0);
        }

        .chip.placed {
            opacity: 0.25;
            pointer-events: none;
            transform: scale(0.92);
        }

        /* ===== CONTROLS ===== */
        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 0.8rem;
        }

        .ctrl-btn {
            padding: 0.6rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: 50px;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .ctrl-btn:hover {
            border-color: var(--text);
            color: var(--text);
        }

        .ctrl-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .ctrl-btn.primary:hover {
            box-shadow: 0 4px 16px rgba(108, 92, 231, 0.4);
        }

        footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            h1 { font-size: 1.4rem; }
            .ph-gradient { height: 42px; }
            .chip { padding: 0.45rem 0.8rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <h1>pH-skalan</h1>
    <p class="subtitle">Klicka på ett ämne för att placera det på skalan</p>

    <div class="scale-wrapper">
        <div class="placed-area" id="placedArea"></div>
        <div class="ph-gradient" id="phGradient"></div>
        <div class="ph-numbers" id="phNumbers"></div>
        <div class="ph-labels">
            <span class="ph-label acid">SURT</span>
            <span class="ph-label neutral">NEUTRALT</span>
            <span class="ph-label base">BASISKT</span>
        </div>
    </div>

    <div class="chips-area">
        <h2>Ämnen att placera:</h2>
        <div class="chips-grid" id="chipsGrid"></div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" onclick="resetAll()">Börja om</button>
        <button class="ctrl-btn primary" onclick="placeAll()">Visa alla</button>
    </div>

    <!-- Info panel -->
    <div class="info-panel" id="infoPanel">
        <div class="info-body">
            <div class="info-name" id="infoName"></div>
            <div class="info-ph" id="infoPh"></div>
            <div class="info-context" id="infoContext"></div>
        </div>
        <button class="info-close" onclick="closeInfo()">✕</button>
    </div>

    <footer>LessonLab — gAIa</footer>

    <script>
        const SUBSTANCES = [
            { name: "Bilbatteri (svavelsyra)", ph: 0.8, context: "Svavelsyra (H₂SO₄) i blyackumulatorer. En stark tvåprotonig syra som ger ifrån sig båda sina vätejoner nästan fullständigt. Extremt frätande." },
            { name: "Magsyra", ph: 1.5, context: "Saltsyra (HCl) som era magsäcksceller producerar. Bryter ner proteiner i maten. Magslemhinnan skyddar er, för utan den skulle magen smälta sig själv." },
            { name: "Citronsaft", ph: 2.4, context: "Citronsyra (C₆H₈O₇), en svag organisk syra. Finns i citrusfrukter, salladdressing och som konserveringsmedel (E330) i livsmedel." },
            { name: "Cola", ph: 2.5, context: "Fosforsyra (H₃PO₄) och kolsyra. Ungefär lika surt som citronsaft. En tand som läggs i cola över natten börjar lösas upp." },
            { name: "Vinäger", ph: 2.5, context: "Ättiksyra (CH₃COOH), ca 5–12 %. En svag syra: bara en liten del av molekylerna ger ifrån sig sin vätejon. Används i matlagning och som rengöringsmedel." },
            { name: "Apelsinjuice", ph: 3.5, context: "Citronsyra och askorbinsyra (C-vitamin). Frukostjuice, fruktjuice ur kartong. Svagare syra än citron på grund av lägre koncentration." },
            { name: "Kaffe", ph: 5.0, context: "Innehåller klorogensyra och andra svaga organiska syror. Svagt surt. Det är därför kaffe kan ge halsbränna om magsäcken redan är irriterad." },
            { name: "Mjölk", ph: 6.5, context: "Nästan neutralt. Mjölksyrabakterier producerar mjölksyra, vilket gör att gammal mjölk blir surare. Filmjölk har pH runt 4,5." },
            { name: "Rent vatten", ph: 7.0, context: "Destillerat eller avjoniserat vatten, helt utan lösta salter. Exakt i balans: lika många H⁺ som OH⁻. Kranvatten har ofta pH 7,5–8,5 på grund av lösta mineraler." },
            { name: "Blod", ph: 7.4, context: "Alltid 7,35–7,45. Kroppen har buffertsystem som håller pH stabilt. Om blodet når pH 7,0 eller 7,8 är det livshotande." },
            { name: "Äggvita", ph: 8.0, context: "Rå äggvita. Svagt basisk. Blir mer basisk ju äldre ägget är, eftersom CO₂ diffunderar ut genom skalet." },
            { name: "Bikarbonat", ph: 8.3, context: "Natriumvätekarbonat (NaHCO₃). Används i bakning, mot halsbränna (neutraliserar magsyra) och som milt rengöringsmedel." },
            { name: "Tvål", ph: 10.0, context: "Traditionell tvål tillverkas genom att reagera fett med natriumhydroxid. Basisk, och det är därför den löser upp fett och smuts från huden." },
            { name: "Ammoniak (hushåll)", ph: 11.5, context: "Ammoniak (NH₃) löst i vatten. Finns i fönsterputs och golvtvätt. Stickande lukt eftersom ammoniakmolekylerna avdunstar lätt. Ventilera alltid." },
            { name: "Klorin", ph: 12.5, context: "Natriumhypoklorit (NaClO) i vatten. Blekmedel som desinficerar pooler och dricksvatten. Starkt oxidationsmedel som förstör organiskt material." },
            { name: "Ugnsrengöring", ph: 13.5, context: "Innehåller natriumhydroxid (NaOH). Löser upp inbränt fett genom förtvålning. Använd alltid handskar, den fräter hud vid kontakt." },
            { name: "Avloppsrens", ph: 14.0, context: "Koncentrerad natriumhydroxid (NaOH). Stark bas som dissocierar fullständigt i vatten. Löser upp fett, hår och organiskt material. Bland det farligaste ni har hemma." }
        ];

        const placedPositions = [];

        function init() {
            const numbersEl = document.getElementById('phNumbers');
            for (let i = 0; i <= 14; i++) {
                const span = document.createElement('span');
                span.textContent = i;
                span.style.left = `${(i / 14) * 100}%`;
                numbersEl.appendChild(span);
            }
            renderChips();
        }

        function renderChips() {
            const grid = document.getElementById('chipsGrid');
            grid.innerHTML = '';
            SUBSTANCES.forEach((sub, i) => {
                const chip = document.createElement('button');
                chip.className = 'chip';
                chip.id = `chip-${i}`;
                chip.textContent = sub.name;
                chip.onclick = () => placeOne(i);
                grid.appendChild(chip);
            });
        }

        function getRow(pct) {
            let row = 0;
            const threshold = 7;
            for (const placed of placedPositions) {
                if (Math.abs(placed.pct - pct) < threshold && placed.row === row) {
                    row++;
                }
                if (Math.abs(placed.pct - pct) < threshold && placed.row === row) {
                    row++;
                }
            }
            return Math.min(row, 2);
        }

        function placeOne(index) {
            const sub = SUBSTANCES[index];
            const chip = document.getElementById(`chip-${index}`);
            if (chip.classList.contains('placed')) return;
            chip.classList.add('placed');

            const pct = (sub.ph / 14) * 100;
            const row = getRow(pct);
            placedPositions.push({ pct, row });

            const area = document.getElementById('placedArea');
            const neededHeight = 36 * (row + 1) + 10;
            if (parseInt(area.style.minHeight || '80') < neededHeight) {
                area.style.minHeight = neededHeight + 'px';
            }

            const item = document.createElement('div');
            item.className = 'placed-item';
            item.style.left = `${pct}%`;
            item.setAttribute('data-row', row);

            const tag = document.createElement('div');
            tag.className = 'placed-tag';
            tag.textContent = sub.name;

            const line = document.createElement('div');
            line.className = 'placed-line';

            const dot = document.createElement('div');
            dot.className = 'placed-dot';

            item.appendChild(tag);
            item.appendChild(line);
            item.appendChild(dot);

            item.onclick = () => showInfo(index);
            area.appendChild(item);
        }

        function showInfo(index) {
            const sub = SUBSTANCES[index];
            document.getElementById('infoName').textContent = sub.name;
            document.getElementById('infoPh').textContent = `pH ${sub.ph}`;
            document.getElementById('infoContext').textContent = sub.context;
            document.getElementById('infoPanel').classList.add('visible');
        }

        function closeInfo() {
            document.getElementById('infoPanel').classList.remove('visible');
        }

        function placeAll() {
            SUBSTANCES.forEach((_, i) => {
                setTimeout(() => placeOne(i), i * 120);
            });
        }

        function resetAll() {
            placedPositions.length = 0;
            document.getElementById('placedArea').innerHTML = '';
            document.getElementById('placedArea').style.minHeight = '80px';
            closeInfo();
            renderChips();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeInfo();
        });

        init();
    </script>
</body>
</html>
