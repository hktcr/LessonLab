<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pH-skalan — Demonstrationsverktyg</title>
    <meta name="description" content="Interaktivt demonstrationsverktyg: placera vardagsämnen på pH-skalan.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #242836;
            --text: #e8eaf0;
            --text-muted: #8b8fa3;
            --border: #2a2e3d;
            --accent: #6c5ce7;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* ===== pH SCALE ===== */
        .scale-wrapper {
            width: 100%;
            max-width: 1000px;
            position: relative;
            margin-bottom: 2.5rem;
        }

        /* Placed items area above gradient */
        .placed-area {
            position: relative;
            width: 100%;
            min-height: 80px;
            margin-bottom: 0.5rem;
        }

        .ph-gradient {
            width: 100%;
            height: 56px;
            border-radius: var(--radius);
            background: linear-gradient(to right,
                #e74c3c 0%,
                #e67e22 10%,
                #f39c12 18%,
                #f1c40f 28%,
                #a8d66a 36%,
                #2ecc71 44%,
                #27ae60 50%,
                #1abc9c 56%,
                #3498db 64%,
                #2980b9 72%,
                #8e44ad 85%,
                #6c3483 100%
            );
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            position: relative;
        }

        .ph-numbers {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0.2rem 0;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .ph-labels {
            display: flex;
            justify-content: space-between;
            padding: 0.15rem 0;
        }

        .ph-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .ph-label.acid { color: #e74c3c; }
        .ph-label.neutral { color: #2ecc71; }
        .ph-label.base { color: #8e44ad; }

        /* ===== PLACED ITEMS ===== */
        .placed-item {
            position: absolute;
            bottom: 0;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: slideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
            cursor: pointer;
        }

        .placed-item .placed-tag {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.3rem 0.6rem;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: border-color 0.2s ease;
        }

        .placed-item:hover .placed-tag,
        .placed-item.active .placed-tag {
            border-color: var(--accent);
        }

        .placed-item .placed-tag .tag-emoji {
            font-size: 0.85rem;
        }

        .placed-item .placed-line {
            width: 2px;
            height: 16px;
            background: var(--text-muted);
            opacity: 0.5;
        }

        .placed-item .placed-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: white;
            border: 2px solid var(--bg);
            box-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        @keyframes slideIn {
            0% { opacity: 0; transform: translateX(-50%) translateY(-15px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Staggered heights to avoid overlap */
        .placed-item[data-row="0"] { bottom: 0; }
        .placed-item[data-row="1"] { bottom: 36px; }
        .placed-item[data-row="2"] { bottom: 72px; }

        /* ===== INFO PANEL ===== */
        .info-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 2px solid var(--accent);
            padding: 1.5rem 2rem;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 200;
            box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .info-panel.visible {
            transform: translateY(0);
        }

        .info-panel .info-emoji {
            font-size: 3rem;
            flex-shrink: 0;
        }

        .info-panel .info-body {
            flex: 1;
        }

        .info-panel .info-name {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 0.2rem;
        }

        .info-panel .info-ph {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.4rem;
        }

        .info-panel .info-context {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .info-panel .info-close {
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info-panel .info-close:hover {
            border-color: var(--text);
            color: var(--text);
        }

        /* ===== SUBSTANCE CHIPS ===== */
        .chips-area {
            width: 100%;
            max-width: 1000px;
        }

        .chips-area h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: var(--text-muted);
        }

        .chips-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: all 0.25s ease;
            user-select: none;
        }

        .chip:hover {
            background: var(--surface-hover);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(108, 92, 231, 0.2);
        }

        .chip:active {
            transform: translateY(0);
        }

        .chip .chip-emoji {
            font-size: 1.15rem;
        }

        .chip.placed {
            opacity: 0.25;
            pointer-events: none;
            transform: scale(0.92);
        }

        /* ===== CONTROLS ===== */
        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 0.8rem;
        }

        .ctrl-btn {
            padding: 0.6rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: 50px;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .ctrl-btn:hover {
            border-color: var(--text);
            color: var(--text);
        }

        .ctrl-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .ctrl-btn.primary:hover {
            box-shadow: 0 4px 16px rgba(108, 92, 231, 0.4);
        }

        footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            body { padding: 1rem; }
            h1 { font-size: 1.4rem; }
            .ph-gradient { height: 42px; }
            .chip { padding: 0.45rem 0.8rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <h1>⚗️ pH-skalan</h1>
    <p class="subtitle">Klicka på ett ämne för att placera det på skalan</p>

    <div class="scale-wrapper">
        <div class="placed-area" id="placedArea"></div>
        <div class="ph-gradient" id="phGradient"></div>
        <div class="ph-numbers" id="phNumbers"></div>
        <div class="ph-labels">
            <span class="ph-label acid">← SURT</span>
            <span class="ph-label neutral">NEUTRALT</span>
            <span class="ph-label base">BASISKT →</span>
        </div>
    </div>

    <div class="chips-area">
        <h2>🧪 Ämnen att placera:</h2>
        <div class="chips-grid" id="chipsGrid"></div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" onclick="resetAll()">🔄 Börja om</button>
        <button class="ctrl-btn primary" onclick="placeAll()">Visa alla</button>
    </div>

    <!-- Info panel -->
    <div class="info-panel" id="infoPanel">
        <div class="info-emoji" id="infoEmoji"></div>
        <div class="info-body">
            <div class="info-name" id="infoName"></div>
            <div class="info-ph" id="infoPh"></div>
            <div class="info-context" id="infoContext"></div>
        </div>
        <button class="info-close" onclick="closeInfo()">✕</button>
    </div>

    <footer>LessonLab v1.0 — gAIa 🌲</footer>

    <script>
        const SUBSTANCES = [
            { name: "Bilbatteri", emoji: "🔋", ph: 0.5, context: "Svavelsyra i blyackumulatorer. Extremt frätande, pH ~0.5." },
            { name: "Magsyra", emoji: "🫃", ph: 1.5, context: "Saltsyra (HCl) i er mage just nu! Bryter ner maten ni åt. pH 1–2." },
            { name: "Citronsaft", emoji: "🍋", ph: 2.5, context: "Pressad citron i vattnet, i salladdressing, i bakning." },
            { name: "Cola", emoji: "🥤", ph: 2.5, context: "Coca-Cola, Pepsi. Fosforsyra + kolsyra. Lika surt som citron!" },
            { name: "Vinäger", emoji: "🫗", ph: 2.8, context: "Ättikssprit till matlagning, inläggningar, ekologiskt rengöringsmedel." },
            { name: "Apelsinjuice", emoji: "🍊", ph: 3.5, context: "Frukostjuice, fruktjuice ur kartong. Citronsyra + askorbinsyra." },
            { name: "Kaffe", emoji: "☕", ph: 5.0, context: "Morgonkaffet. Svagt surt — det är därför det kan ge halsbränna." },
            { name: "Mjölk", emoji: "🥛", ph: 6.5, context: "Mjölken i kylskåpet. Nästan neutralt, lite surt på grund av mjölksyra." },
            { name: "Rent vatten", emoji: "💧", ph: 7.0, context: "Destillerat vatten. Exakt i balans: lika många H⁺ som OH⁻." },
            { name: "Blod", emoji: "🩸", ph: 7.4, context: "Ert blod, alltid 7.35–7.45. Kroppen dör om det ändras mer än ±0.4." },
            { name: "Äggvita", emoji: "🥚", ph: 8.0, context: "Rå äggvita. Svagt basisk — skyddar embryot inuti ägget." },
            { name: "Bikarbonat", emoji: "🧁", ph: 8.5, context: "Bakpulver i bakning, mot halsbränna (neutraliserar magsyra!)." },
            { name: "Tvål", emoji: "🧼", ph: 10.0, context: "Handtvål, duschtvål. Basisk — det är därför den löser upp fett och smuts." },
            { name: "Ammoniak", emoji: "⚠️", ph: 11.5, context: "Fönsterputs, golvtvätt, industrirengöring. Stickande lukt — ventilera!" },
            { name: "Klorin", emoji: "🧴", ph: 12.5, context: "Blekmedel för tvätt, desinficerar pooler och dricksvatten. Natriumhypoklorit." },
            { name: "Ugnsrengöring", emoji: "🔥", ph: 13.5, context: "Spreja in ugnen, stäng, vänta. Löser upp inbränt fett — och hud om ni inte är försiktiga." },
            { name: "Avloppsrens", emoji: "🚰", ph: 14.0, context: "Propplösare. Natriumhydroxid (NaOH). Bland det farligaste ni har hemma." }
        ];

        // Track placed items and their positions for stacking
        const placedPositions = [];

        function init() {
            const numbersEl = document.getElementById('phNumbers');
            for (let i = 0; i <= 14; i++) {
                const span = document.createElement('span');
                span.textContent = i;
                numbersEl.appendChild(span);
            }
            renderChips();
        }

        function renderChips() {
            const grid = document.getElementById('chipsGrid');
            grid.innerHTML = '';
            SUBSTANCES.forEach((sub, i) => {
                const chip = document.createElement('button');
                chip.className = 'chip';
                chip.id = `chip-${i}`;
                chip.innerHTML = `<span class="chip-emoji">${sub.emoji}</span> ${sub.name}`;
                chip.onclick = () => placeOne(i);
                grid.appendChild(chip);
            });
        }

        function getRow(pct) {
            // Check how close this is to already-placed items
            // and assign a different row if overlapping
            let row = 0;
            const threshold = 7; // percent distance considered "overlapping"
            for (const placed of placedPositions) {
                if (Math.abs(placed.pct - pct) < threshold && placed.row === row) {
                    row++;
                }
                if (Math.abs(placed.pct - pct) < threshold && placed.row === row) {
                    row++;
                }
            }
            return Math.min(row, 2);
        }

        function placeOne(index) {
            const sub = SUBSTANCES[index];
            const chip = document.getElementById(`chip-${index}`);
            if (chip.classList.contains('placed')) return;
            chip.classList.add('placed');

            const pct = (sub.ph / 14) * 100;
            const row = getRow(pct);
            placedPositions.push({ pct, row });

            const area = document.getElementById('placedArea');

            // Expand area height if needed
            const neededHeight = 36 * (row + 1) + 10;
            if (parseInt(area.style.minHeight || '80') < neededHeight) {
                area.style.minHeight = neededHeight + 'px';
            }

            const item = document.createElement('div');
            item.className = 'placed-item';
            item.style.left = `${pct}%`;
            item.setAttribute('data-row', row);

            item.innerHTML = `
                <div class="placed-tag">
                    <span class="tag-emoji">${sub.emoji}</span>
                    ${sub.name}
                </div>
                <div class="placed-line"></div>
                <div class="placed-dot"></div>
            `;

            item.onclick = () => showInfo(index);
            area.appendChild(item);
        }

        function showInfo(index) {
            const sub = SUBSTANCES[index];
            document.getElementById('infoEmoji').textContent = sub.emoji;
            document.getElementById('infoName').textContent = sub.name;
            document.getElementById('infoPh').textContent = `pH ${sub.ph}`;
            document.getElementById('infoContext').textContent = sub.context;
            document.getElementById('infoPanel').classList.add('visible');
            // Highlight active
            document.querySelectorAll('.placed-item').forEach(el => el.classList.remove('active'));
        }

        function closeInfo() {
            document.getElementById('infoPanel').classList.remove('visible');
        }

        function placeAll() {
            SUBSTANCES.forEach((_, i) => {
                setTimeout(() => placeOne(i), i * 120);
            });
        }

        function resetAll() {
            placedPositions.length = 0;
            document.getElementById('placedArea').innerHTML = '';
            document.getElementById('placedArea').style.minHeight = '80px';
            closeInfo();
            renderChips();
        }

        // Close info on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeInfo();
        });

        init();
    </script>
</body>
</html>
