<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pH-skalan — Interaktivt verktyg</title>
    <meta name="description" content="Interaktivt verktyg: placera vardagsämnen på pH-skalan.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #242836;
            --text: #e8eaf0;
            --text-muted: #8b8fa3;
            --border: #2a2e3d;
            --accent: #6c5ce7;
            --success: #00b894;
            --danger: #ff6b6b;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .score-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .score-bar .score {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--success);
        }

        .score-bar .wrong {
            color: var(--danger);
        }

        /* ===== pH SCALE ===== */
        .scale-container {
            width: 100%;
            max-width: 900px;
            position: relative;
            margin-bottom: 2rem;
        }

        .ph-gradient {
            width: 100%;
            height: 60px;
            border-radius: var(--radius);
            background: linear-gradient(to right,
                #e74c3c 0%,
                #e67e22 14%,
                #f1c40f 28%,
                #2ecc71 42%,
                #27ae60 50%,
                #3498db 64%,
                #2980b9 78%,
                #8e44ad 92%,
                #6c3483 100%
            );
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            position: relative;
        }

        .ph-numbers {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0.3rem 0;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .ph-labels {
            display: flex;
            justify-content: space-between;
            padding: 0.2rem 0;
        }

        .ph-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .ph-label.acid { color: #e74c3c; }
        .ph-label.neutral { color: #2ecc71; }
        .ph-label.base { color: #8e44ad; }

        /* Placed items on scale */
        .placed-item {
            position: absolute;
            transform: translateX(-50%);
            top: -38px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: dropIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
            cursor: pointer;
        }

        .placed-item .placed-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--text);
            border: 2px solid var(--bg);
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .placed-item .placed-label {
            font-size: 0.65rem;
            font-weight: 600;
            white-space: nowrap;
            background: var(--surface);
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 2px;
            border: 1px solid var(--border);
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .placed-item .placed-connector {
            width: 2px;
            height: 20px;
            background: var(--text-muted);
        }

        @keyframes dropIn {
            0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Tooltip for placed items */
        .placed-tooltip {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 0.7rem;
            font-size: 0.75rem;
            width: 180px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            display: none;
            z-index: 100;
        }

        .placed-item:hover .placed-tooltip,
        .placed-item:focus .placed-tooltip {
            display: block;
        }

        .placed-tooltip .tt-name {
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        .placed-tooltip .tt-ph {
            color: var(--accent);
            font-weight: 600;
        }

        .placed-tooltip .tt-context {
            color: var(--text-muted);
            font-size: 0.7rem;
            margin-top: 0.2rem;
            line-height: 1.3;
        }

        /* ===== SUBSTANCE CHIPS ===== */
        .chips-area {
            width: 100%;
            max-width: 900px;
        }

        .chips-area h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: var(--text-muted);
        }

        .chips-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.55rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .chip:hover {
            background: var(--surface-hover);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.2);
        }

        .chip:active {
            transform: translateY(0);
        }

        .chip .chip-emoji {
            font-size: 1.1rem;
        }

        .chip.placed {
            opacity: 0.3;
            pointer-events: none;
            transform: scale(0.95);
        }

        .chip.correct {
            border-color: var(--success);
            background: rgba(0, 184, 148, 0.1);
        }

        .chip.incorrect {
            border-color: var(--danger);
            background: rgba(255, 107, 107, 0.1);
        }

        /* ===== GUESS MODE ===== */
        .guess-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .guess-overlay.active {
            display: flex;
        }

        .guess-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .guess-card .guess-emoji {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .guess-card .guess-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .guess-card .guess-context {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .guess-card .guess-prompt {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .ph-slider-container {
            margin-bottom: 1rem;
        }

        .ph-slider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            border-radius: 4px;
            background: linear-gradient(to right,
                #e74c3c 0%, #f1c40f 28%, #2ecc71 50%, #3498db 72%, #8e44ad 100%
            );
            outline: none;
            cursor: pointer;
        }

        .ph-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: grab;
        }

        .ph-slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: grab;
            border: none;
        }

        .ph-value-display {
            font-size: 2rem;
            font-weight: 800;
            margin: 0.5rem 0;
        }

        .guess-btn {
            padding: 0.7rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--accent);
            color: white;
            transition: all 0.2s ease;
        }

        .guess-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(108, 92, 231, 0.4);
        }

        /* Result feedback */
        .result-feedback {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: var(--radius);
            font-size: 0.9rem;
            display: none;
            line-height: 1.4;
        }

        .result-feedback.show { display: block; }

        .result-feedback.correct {
            background: rgba(0, 184, 148, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .result-feedback.incorrect {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .result-close-btn {
            margin-top: 1rem;
            padding: 0.5rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: 50px;
            background: transparent;
            color: var(--text);
            font-size: 0.85rem;
            cursor: pointer;
            display: none;
        }

        .result-close-btn.show { display: inline-block; }

        /* ===== RESET ===== */
        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 0.8rem;
        }

        .reset-btn {
            padding: 0.6rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: 50px;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reset-btn:hover {
            border-color: var(--text);
            color: var(--text);
        }

        /* ===== FOOTER ===== */
        footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            body { padding: 1rem; }
            h1 { font-size: 1.2rem; }
            .ph-gradient { height: 45px; }
            .chip { padding: 0.45rem 0.8rem; font-size: 0.8rem; }
            .placed-item { top: -32px; }
            .placed-item .placed-label { font-size: 0.55rem; max-width: 70px; }
        }
    </style>
</head>
<body>
    <h1>⚗️ pH-skalan</h1>
    <p class="subtitle">Klicka på ett ämne — gissa var det hamnar!</p>

    <div class="score-bar">
        <span>✅ Rätt: <span class="score" id="correctCount">0</span></span>
        <span>❌ Fel: <span class="score wrong" id="wrongCount">0</span></span>
        <span>📊 Kvar: <span id="remainingCount">0</span></span>
    </div>

    <div class="scale-container" id="scaleContainer">
        <div class="ph-gradient" id="phGradient"></div>
        <div class="ph-numbers" id="phNumbers"></div>
        <div class="ph-labels">
            <span class="ph-label acid">← SURT</span>
            <span class="ph-label neutral">NEUTRALT</span>
            <span class="ph-label base">BASISKT →</span>
        </div>
    </div>

    <div class="chips-area">
        <h2>🧪 Klicka på ett ämne för att placera det:</h2>
        <div class="chips-grid" id="chipsGrid"></div>
    </div>

    <div class="controls">
        <button class="reset-btn" onclick="resetAll()">🔄 Börja om</button>
        <button class="reset-btn" onclick="revealAll()">👁 Visa alla svar</button>
    </div>

    <!-- Guess overlay -->
    <div class="guess-overlay" id="guessOverlay">
        <div class="guess-card">
            <div class="guess-emoji" id="guessEmoji"></div>
            <div class="guess-name" id="guessName"></div>
            <div class="guess-context" id="guessContext"></div>
            <div class="guess-prompt">Var på pH-skalan tror du det hamnar?</div>
            <div class="ph-slider-container">
                <input type="range" class="ph-slider" id="phSlider" min="0" max="14" step="0.5" value="7">
                <div class="ph-value-display" id="phValueDisplay">pH 7</div>
            </div>
            <button class="guess-btn" id="guessBtn" onclick="submitGuess()">Gissa!</button>
            <div class="result-feedback" id="resultFeedback"></div>
            <button class="result-close-btn" id="resultCloseBtn" onclick="closeGuess()">Nästa →</button>
        </div>
    </div>

    <footer>LessonLab v1.0 — gAIa 🌲</footer>

    <script>
        const SUBSTANCES = [
            { name: "Bilbatteri", emoji: "🔋", ph: 0.5, context: "Elbilens batteri, blyackumulatorer. Svavelsyra — extremt frätande." },
            { name: "Magsyra", emoji: "🫃", ph: 1.5, context: "I er mage just nu! Saltsyra (HCl) som bryter ner maten. pH 1–2." },
            { name: "Citronsaft", emoji: "🍋", ph: 2.5, context: "Pressad citron i vattnet, salladdressing, bakning." },
            { name: "Vinäger", emoji: "🫗", ph: 2.8, context: "Ättikssprit till matlagning, inläggningar, städmedel." },
            { name: "Cola", emoji: "🥤", ph: 2.5, context: "Coca-Cola, Pepsi. Fosforsyra + kolsyra. Lika surt som citronsaft!" },
            { name: "Apelsinjuice", emoji: "🍊", ph: 3.5, context: "Frukostjuice, fruktjuice ur kartong. Citronsyra." },
            { name: "Kaffe", emoji: "☕", ph: 5.0, context: "Morgonkaffet. Svagt surt — det är därför det kan ge halsbränna." },
            { name: "Mjölk", emoji: "🥛", ph: 6.5, context: "Mjölk i kylskåpet. Nästan neutralt, lite surt av mjölksyra." },
            { name: "Rent vatten", emoji: "💧", ph: 7.0, context: "Destillerat vatten. Exakt i balans: lika många H⁺ som OH⁻." },
            { name: "Blod", emoji: "🩸", ph: 7.4, context: "Ert blod, alltid 7.35–7.45. Kroppen dör om det ändras mycket." },
            { name: "Ägg", emoji: "🥚", ph: 8.0, context: "Rå äggvita. Svagt basisk. Tänk: ägget skyddar kyckling-embryot." },
            { name: "Bakpulver", emoji: "🧁", ph: 8.5, context: "Bikarbonat i bakning, mot halsbränna (neutraliserar magsyra!)." },
            { name: "Tvål", emoji: "🧼", ph: 10.0, context: "Handtvål, duschtvål. Basisk — det är därför den löser upp fett." },
            { name: "Ammoniak", emoji: "⚠️", ph: 11.5, context: "Fönsterputs, industriellt rengöringsmedel. Stickande lukt." },
            { name: "Klorin", emoji: "🧴", ph: 12.5, context: "Blekmedel för tvätt, desinficerar pooler. Natriumhypoklorit." },
            { name: "Ugnsrengöring", emoji: "🔥", ph: 13.5, context: "Spreja in ugnen, stäng, vänta. Löser upp inbränt fett." },
            { name: "Avloppsrens", emoji: "🚰", ph: 14.0, context: "Propplösare. Natriumhydroxid (NaOH). Det farligaste hemma." }
        ];

        let correctCount = 0;
        let wrongCount = 0;
        let currentSubstance = null;
        let shuffledSubstances = [];

        function init() {
            // Generate pH numbers
            const numbersEl = document.getElementById('phNumbers');
            for (let i = 0; i <= 14; i++) {
                const span = document.createElement('span');
                span.textContent = i;
                numbersEl.appendChild(span);
            }

            // Shuffle substances
            shuffledSubstances = [...SUBSTANCES].sort(() => Math.random() - 0.5);

            // Generate chips
            renderChips();
            updateCounts();
        }

        function renderChips() {
            const grid = document.getElementById('chipsGrid');
            grid.innerHTML = '';
            shuffledSubstances.forEach((sub, i) => {
                const chip = document.createElement('button');
                chip.className = 'chip';
                chip.id = `chip-${i}`;
                chip.innerHTML = `<span class="chip-emoji">${sub.emoji}</span> ${sub.name}`;
                chip.onclick = () => openGuess(i);
                grid.appendChild(chip);
            });
        }

        function openGuess(index) {
            currentSubstance = { ...shuffledSubstances[index], index };
            document.getElementById('guessEmoji').textContent = currentSubstance.emoji;
            document.getElementById('guessName').textContent = currentSubstance.name;
            document.getElementById('guessContext').textContent = currentSubstance.context;
            document.getElementById('phSlider').value = 7;
            document.getElementById('phValueDisplay').textContent = 'pH 7';
            document.getElementById('resultFeedback').className = 'result-feedback';
            document.getElementById('resultFeedback').style.display = 'none';
            document.getElementById('resultCloseBtn').className = 'result-close-btn';
            document.getElementById('guessBtn').style.display = '';
            document.getElementById('guessOverlay').classList.add('active');
        }

        document.getElementById('phSlider').addEventListener('input', (e) => {
            document.getElementById('phValueDisplay').textContent = `pH ${e.target.value}`;
        });

        function submitGuess() {
            const guess = parseFloat(document.getElementById('phSlider').value);
            const actual = currentSubstance.ph;
            const diff = Math.abs(guess - actual);
            const feedback = document.getElementById('resultFeedback');
            const chip = document.getElementById(`chip-${currentSubstance.index}`);

            let isCorrect = diff <= 1.5;

            if (isCorrect) {
                correctCount++;
                feedback.className = 'result-feedback show correct';
                if (diff <= 0.5) {
                    feedback.innerHTML = `🎯 <strong>Pricksäkert!</strong> Rätt svar: pH ${actual}. Du gissade ${guess}.`;
                } else {
                    feedback.innerHTML = `✅ <strong>Nära!</strong> Rätt svar: pH ${actual}. Du gissade ${guess}.`;
                }
                chip.classList.add('placed', 'correct');
            } else {
                wrongCount++;
                feedback.className = 'result-feedback show incorrect';
                feedback.innerHTML = `❌ <strong>Inte riktigt.</strong> Rätt svar: pH ${actual}. Du gissade ${guess}. Skillnad: ${diff.toFixed(1)} steg.`;
                chip.classList.add('placed', 'incorrect');
            }

            // Place on scale
            placeOnScale(currentSubstance, actual);

            document.getElementById('guessBtn').style.display = 'none';
            document.getElementById('resultCloseBtn').className = 'result-close-btn show';
            updateCounts();
        }

        function placeOnScale(substance, ph) {
            const container = document.getElementById('scaleContainer');
            const gradient = document.getElementById('phGradient');
            const pct = (ph / 14) * 100;

            const item = document.createElement('div');
            item.className = 'placed-item';
            item.style.left = `${pct}%`;
            item.style.top = '-38px';
            item.tabIndex = 0;

            item.innerHTML = `
                <div class="placed-tooltip">
                    <div class="tt-name">${substance.emoji} ${substance.name}</div>
                    <div class="tt-ph">pH ${substance.ph}</div>
                    <div class="tt-context">${substance.context}</div>
                </div>
                <div class="placed-label">${substance.name}</div>
                <div class="placed-connector"></div>
                <div class="placed-dot"></div>
            `;

            gradient.appendChild(item);
        }

        function closeGuess() {
            document.getElementById('guessOverlay').classList.remove('active');
            currentSubstance = null;
        }

        function updateCounts() {
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;
            const placed = document.querySelectorAll('.chip.placed').length;
            document.getElementById('remainingCount').textContent = SUBSTANCES.length - placed;
        }

        function resetAll() {
            correctCount = 0;
            wrongCount = 0;
            document.querySelectorAll('.placed-item').forEach(el => el.remove());
            shuffledSubstances = [...SUBSTANCES].sort(() => Math.random() - 0.5);
            renderChips();
            updateCounts();
        }

        function revealAll() {
            SUBSTANCES.forEach((sub, i) => {
                const chip = document.getElementById(`chip-${i}`);
                if (chip && !chip.classList.contains('placed')) {
                    chip.classList.add('placed');
                    placeOnScale(sub, sub.ph);
                }
            });
            updateCounts();
        }

        // Close overlay on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeGuess();
        });

        init();
    </script>
</body>
</html>
