<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LessonLab — Årshjul</title>
    <meta name="description" content="Lösenordsskyddad samling av genomgångsmanus för klassrummet.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ===== LOGIN SCREEN ===== -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <span class="login-icon">🧪</span>
            <h1 class="login-title">LessonLab</h1>
            <p class="login-subtitle">Genomgångsmanus för klassrummet</p>
            <div class="login-input-group">
                <input type="password" class="login-input" id="passwordInput" placeholder="Ange lösenord..." autofocus
                    autocomplete="current-password">
            </div>
            <button class="login-btn" id="loginBtn" onclick="doLogin()">Logga in</button>
            <p class="login-error" id="loginError"></p>
        </div>
    </div>

    <!-- ===== MAIN APP (PREMIUM DONUT UI) ===== -->
    <div class="donut-app" id="mainApp">
        
        <div class="donut-left">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h1 class="app-title" style="font-size: 2.5rem; margin-bottom: 0;">LessonLab</h1>
                <p class="app-subtitle" style="margin-bottom: 0;">Interaktivt Årshjul</p>
            </div>

            <div class="year-tabs" id="yearTabs">
                <button class="year-tab active" onclick="setYear(7)">Årskurs 7</button>
                <button class="year-tab" onclick="setYear(8)">Årskurs 8</button>
                <button class="year-tab" onclick="setYear(9)">Årskurs 9</button>
            </div>

            <!-- THE WHEEL -->
            <div class="wheel-container">
                <div class="wheel-semester-label label-ht">Hösttermin</div>
                <div class="wheel-semester-label label-vt">Vårtermin</div>
                
                <svg class="wheel-svg" viewBox="0 0 600 600" id="donutSvg">
                    <defs>
                        <!-- Gradients for subjects -->
                        <linearGradient id="grad-kemi" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#f59e0b" />
                            <stop offset="100%" stop-color="#ea580c" />
                        </linearGradient>
                        <linearGradient id="grad-fysik" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3b82f6" />
                            <stop offset="100%" stop-color="#4f46e5" />
                        </linearGradient>
                        <linearGradient id="grad-biologi" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#10b981" />
                            <stop offset="100%" stop-color="#059669" />
                        </linearGradient>
                        <linearGradient id="grad-kroppen" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#f43f5e" />
                            <stop offset="100%" stop-color="#e11d48" />
                        </linearGradient>
                        <linearGradient id="grad-neutral" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#64748b" />
                            <stop offset="100%" stop-color="#334155" />
                        </linearGradient>
                    </defs>
                    <!-- Slices injected via JS -->
                    <g id="donutGroup"></g>
                    
                    <!-- Semester Dividers (Top and Bottom lines) -->
                    <line x1="300" y1="310" x2="300" y2="290" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
                    <line x1="300" y1="10" x2="300" y2="-10" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
                </svg>

                <!-- CENTER VIEWPORT -->
                <div class="wheel-center">
                    <div class="center-bg" id="centerBg"></div>
                    <div class="wheel-center-content">
                        <div class="center-season" id="centerSeason">Välj Område</div>
                        <h2 class="center-title" id="centerTitle">Årshjul</h2>
                    </div>
                </div>
            </div>
            
            <footer class="app-footer" style="margin-top: 2rem; border-top: none; padding-top: 0;">
                LessonLab v3.0 (Årshjul UI) ·
                <button class="logout-btn" onclick="doLogout()">Logga ut</button>
            </footer>
        </div>

        <!-- CONTENT PANEL -->
        <div class="donut-right">
            <div class="orbital-content" id="contentPanel">
                <div class="subject-card">
                    <div class="subject-header">
                        <h2 class="subject-title" id="panelTitle" style="font-size: 1.5rem; margin-bottom: 0.5rem;">Lektioner & Manus</h2>
                        <div style="color: var(--text-secondary); font-size: 0.9rem;" id="panelSubtitle">Välj ett område i hjulet</div>
                    </div>
                    <div class="lesson-list-container">
                        <ul class="lesson-list" id="panelLessons">
                            <!-- Lessons injected via JS -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="auth.js"></script>
    <script>
        // Data Structure based on NO_ARSHJUL.md
        const yearData = {
            7: [
                { id: '7-1', title: 'Materia & Kemi', grad: 'url(#grad-kemi)', bg: 'url(assets/images/kemi-bg.png)', status: 'planned', season: 'Hösttermin', weeks: 11, lessons: [] },
                { id: '7-2', title: 'Energi', grad: 'url(#grad-fysik)', bg: 'url(assets/images/fysik-bg.png)', status: 'planned', season: 'Hösttermin', weeks: 5, lessons: [] },
                { id: '7-3', title: 'Rymden', grad: 'url(#grad-fysik)', bg: 'url(assets/images/rymden-bg.png)', status: 'planned', season: 'Vårtermin', weeks: 3, lessons: [] },
                { id: '7-4', title: 'Biologins grunder', grad: 'url(#grad-biologi)', bg: 'url(biologins-grunder/beech-bg.png)', status: 'ready', season: 'Vårtermin', weeks: 11, lessons: [
                    { title: 'Cellritning på tavlan', url: 'biologins-grunder/cellritning.html', status: 'ready' },
                    { title: 'Fotosyntes + Cellandning', url: 'biologins-grunder/fotosyntes.html', status: 'ready' },
                    { title: 'Bakterier & Virus (v1)', url: 'biologins-grunder/bakterier-virus.html', status: 'ready' },
                    { title: 'Bakterier & Virus (v2)', url: 'biologins-grunder/bakterier-virus-v2.html', status: 'ready' },
                    { title: 'Gruppchallenge — Rep', url: 'biologins-grunder/gruppchallenge.html', status: 'ready' },
                    { title: '🌿 Ekologi L1: Spelplanen', url: 'biologins-grunder/ekologi-l1-spelplanen.html', status: 'ready' },
                    { title: 'Ekologi L2: Mekaniken', url: 'biologins-grunder/ekologi-l2-mekaniken.html', status: 'ready' },
                    { title: 'Ekologi L3: Pusslet', url: 'biologins-grunder/ekologi-l3-pusslet.html', status: 'ready' },
                    { title: 'Samspel i Naturen', url: 'biologins-grunder/samspel-i-naturen.html', status: 'ready' },
                    { title: '🌲 L4: Systematisk Fältstudie', url: 'biologins-grunder/ekologi-l4-faltstudie.html', status: 'ready' },
                    { title: '🌳 L5: Fältstudie Bokskog', url: 'biologins-grunder/ekologi-l5-bokskog.html', status: 'ready' }
                ]},
                { id: '7-5', title: 'Syror & Baser', grad: 'url(#grad-kemi)', bg: 'url(assets/images/kemi-bg.png)', status: 'ready', season: 'Vårtermin', weeks: 6, lessons: [
                    { title: 'Dag 1: Syror, baser & pH', url: 'kemins-grunder/syror-baser.html', status: 'ready' },
                    { title: 'Dag 2: pH-fördjupning', url: 'kemins-grunder/ph-fordjupning.html', status: 'ready' },
                    { title: '🎮 pH-skalan — Interaktivt', url: 'kemins-grunder/ph-skalan.html', status: 'ready' },
                    { title: '🧪 BTB-labb med kolsyra', url: 'kemins-grunder/btb-labb.html', status: 'ready' }
                ]}
            ],
            8: [
                { id: '8-1', title: 'Näringsämnen', grad: 'url(#grad-kroppen)', bg: 'url(assets/images/kroppen-bg.png)', status: 'planned', season: 'Hösttermin', weeks: 2, lessons: [] },
                { id: '8-2', title: 'Människokroppen', grad: 'url(#grad-kroppen)', bg: 'url(assets/images/kroppen-bg.png)', status: 'planned', season: 'Hösttermin', weeks: 9, lessons: [] },
                { id: '8-3', title: 'Ellära', grad: 'url(#grad-fysik)', bg: 'url(assets/images/fysik-bg.png)', status: 'planned', season: 'Hösttermin', weeks: 6, lessons: [] },
                { id: '8-4', title: 'Kol & Organisk', grad: 'url(#grad-kemi)', bg: 'url(assets/images/kemi-bg.png)', status: 'planned', season: 'Vårtermin', weeks: 10, lessons: [] },
                { id: '8-5', title: 'Våglära', grad: 'url(#grad-fysik)', bg: 'url(assets/images/fysik-bg.png)', status: 'planned', season: 'Vårtermin', weeks: 6, lessons: [] },
                { id: '8-6', title: 'Hälsa & Sex', grad: 'url(#grad-kroppen)', bg: 'url(assets/images/kroppen-bg.png)', status: 'planned', season: 'Vårtermin', weeks: 4, lessons: [] }
            ],
            9: [
                { id: '9-1', title: 'Genetik', grad: 'url(#grad-biologi)', bg: 'url(assets/images/kroppen-bg.png)', status: 'planned', season: 'Hösttermin', weeks: 6, lessons: [] },
                { id: '9-2', title: 'Atom- & Kärnfysik', grad: 'url(#grad-fysik)', bg: 'url(assets/images/fysik-bg.png)', status: 'planned', season: 'Hösttermin', weeks: 6, lessons: [] },
                { id: '9-3', title: 'Evolution', grad: 'url(#grad-biologi)', bg: 'url(biologins-grunder/beech-bg.png)', status: 'planned', season: 'Hösttermin', weeks: 5, lessons: [] },
                { id: '9-4', title: 'Mekanik', grad: 'url(#grad-fysik)', bg: 'url(assets/images/fysik-bg.png)', status: 'planned', season: 'Vårtermin', weeks: 6, lessons: [] },
                { id: '9-5', title: 'Miljövetenskap', grad: 'url(#grad-biologi)', bg: 'url(biologins-grunder/beech-bg.png)', status: 'planned', season: 'Vårtermin', weeks: 10, lessons: [] }
            ]
        };

        let currentYear = 7;
        let activeNodeId = null;

        if (LESSON_LAB_AUTH.isAuthenticated()) showApp();
        async function doLogin() { await LESSON_LAB_AUTH.handleLogin(document.getElementById('passwordInput'), document.getElementById('loginError'), showApp); }
        function doLogout() { LESSON_LAB_AUTH.logout(); }
        document.getElementById('passwordInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

        function showApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.add('visible');
            setYear(7);
        }

        function setYear(year) {
            currentYear = year;
            document.querySelectorAll('.year-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent.includes(year)) tab.classList.add('active');
            });
            renderDonut();
        }

        function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
            var angleInRadians = (angleInDegrees) * Math.PI / 180.0;
            return {
                x: centerX + (radius * Math.cos(angleInRadians)),
                y: centerY + (radius * Math.sin(angleInRadians))
            };
        }

        function describeDonutArc(x, y, innerRadius, outerRadius, startAngle, endAngle) {
            var startOuter = polarToCartesian(x, y, outerRadius, endAngle);
            var endOuter   = polarToCartesian(x, y, outerRadius, startAngle);
            var startInner = polarToCartesian(x, y, innerRadius, endAngle);
            var endInner   = polarToCartesian(x, y, innerRadius, startAngle);
            var largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
            return [
                "M", startOuter.x, startOuter.y,
                "A", outerRadius, outerRadius, 0, largeArcFlag, 0, endOuter.x, endOuter.y,
                "L", endInner.x, endInner.y,
                "A", innerRadius, innerRadius, 0, largeArcFlag, 1, startInner.x, startInner.y,
                "Z"
            ].join(" ");
        }

        function renderDonut() {
            const group = document.getElementById('donutGroup');
            group.innerHTML = '';
            
            const nodes = yearData[currentYear];
            const htNodes = nodes.filter(n => n.season === 'Hösttermin');
            const vtNodes = nodes.filter(n => n.season === 'Vårtermin');
            
            const gap = 2; // Degrees gap between slices
            let firstReadyNodeId = null;

            function renderHalf(halfNodes, startAngleRange, endAngleRange) {
                if(halfNodes.length === 0) return;
                
                // Add a small 4-degree padding at the top/bottom edges so the halves don't touch
                const actualStart = startAngleRange + 4;
                const actualEnd = endAngleRange - 4;
                
                const totalAvailableAngle = (actualEnd - actualStart) - (halfNodes.length * gap);
                const totalWeeks = halfNodes.reduce((sum, n) => sum + (n.weeks || 10), 0);
                
                let currentAngle = actualStart;
                
                halfNodes.forEach(node => {
                    if (node.status === 'ready' && !firstReadyNodeId) {
                        firstReadyNodeId = node.id;
                    }
                    
                    // Calculate slice width proportionally based on weeks
                    const sliceAngle = (node.weeks / totalWeeks) * totalAvailableAngle;
                    
                    const endAngle = currentAngle + sliceAngle;
                    const d = describeDonutArc(300, 300, 205, 290, currentAngle, endAngle);
                    
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", d);
                    path.setAttribute("fill", node.grad);
                    path.setAttribute("stroke", "transparent");
                    path.setAttribute("class", `wheel-slice ${node.id === activeNodeId ? 'active' : ''}`);
                    path.setAttribute("data-id", node.id);
                    path.onclick = () => selectNode(node.id);
                    
                    group.appendChild(path);
                    currentAngle = endAngle + gap;
                });
            }

            // SVG is rotated -90deg in CSS, so 0deg is Top (August), 90deg is Right, 180deg is Bottom (January).
            renderHalf(htNodes, 0, 180); // Right side
            renderHalf(vtNodes, 180, 360); // Left side

            if (!activeNodeId || !nodes.find(n => n.id === activeNodeId)) {
                selectNode(firstReadyNodeId || nodes[0].id);
            }
        }

        function selectNode(nodeId) {
            activeNodeId = nodeId;
            
            // Update SVG
            document.querySelectorAll('.wheel-slice').forEach(el => el.classList.remove('active'));
            const activeEl = document.querySelector(`.wheel-slice[data-id="${nodeId}"]`);
            if (activeEl) activeEl.classList.add('active');

            // Find data
            const nodes = yearData[currentYear];
            const nodeData = nodes.find(n => n.id === nodeId);
            
            if (nodeData) renderContent(nodeData);
        }

        function renderContent(data) {
            // Update Viewport (Center of Donut)
            const centerBg = document.getElementById('centerBg');
            const centerTitle = document.getElementById('centerTitle');
            const centerSeason = document.getElementById('centerSeason');
            
            centerBg.classList.remove('active');
            setTimeout(() => {
                centerBg.style.background = data.bg;
                if (data.bg.includes('url')) centerBg.style.backgroundSize = 'cover';
                centerTitle.textContent = data.title;
                centerSeason.textContent = data.season;
                centerBg.classList.add('active');
                // Color the border of the viewport to match the subject
                const rootGradColor = data.grad.includes('biologi') ? 'rgba(16, 185, 129, 0.4)' :
                                      data.grad.includes('kemi') ? 'rgba(245, 158, 11, 0.4)' :
                                      data.grad.includes('fysik') ? 'rgba(59, 130, 246, 0.4)' :
                                      data.grad.includes('kroppen') ? 'rgba(244, 63, 94, 0.4)' : 'rgba(255,255,255,0.1)';
                document.querySelector('.wheel-center').style.borderColor = rootGradColor;
                document.querySelector('.wheel-center').style.boxShadow = `inset 0 0 50px rgba(0,0,0,0.8), 0 0 40px ${rootGradColor}`;
            }, 300);

            // Update Panel
            const panel = document.getElementById('contentPanel');
            const panelTitle = document.getElementById('panelTitle');
            const panelSubtitle = document.getElementById('panelSubtitle');
            const lessonList = document.getElementById('panelLessons');

            panel.classList.remove('visible');

            setTimeout(() => {
                panelTitle.textContent = data.title;
                panelSubtitle.textContent = `${data.season} · Årskurs ${currentYear}`;
                lessonList.innerHTML = '';
                
                if (data.lessons.length === 0) {
                    lessonList.innerHTML = `
                        <li class="lesson-item" style="justify-content: center; padding: 2rem 0; color: var(--text-muted);">
                            <i>Inga manus tillgängliga ännu.</i>
                        </li>
                    `;
                } else {
                    data.lessons.forEach(lesson => {
                        const badgeClass = lesson.status === 'ready' ? 'badge-ready' : 'badge-planned';
                        const badgeText = lesson.status === 'ready' ? 'Klar' : 'Planerat';
                        
                        lessonList.innerHTML += `
                            <li class="lesson-item">
                                <a href="${lesson.url}" class="lesson-link">${lesson.title}</a>
                                <span class="lesson-badge ${badgeClass}">${badgeText}</span>
                            </li>
                        `;
                    });
                }
                panel.classList.add('visible');
            }, 300);
        }
    </script>
</body>
</html>
